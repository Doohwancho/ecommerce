version: "3.7"

# network:
#   frontend_network: #얘로 frontend, backend, db 같은 네트워크로 묶는 것
#     driver: bridge
#   backend_network:
#     driver: bridge

services:
  frontend:
    restart: always
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Seoul
    depends_on:
      - backend

  backend:
    restart: always
    build:
      context: ./backend/ecommerce/
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:tcp://h2:1521/demo
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD:
    depends_on:
        - database
  database:
    container_name: h2
    image: oscarfonts/h2:latest
    ports:
      - 1521:1521
      - 8081:81
    environment:
      H2_OPTIONS: -ifNotExists
    volumes:
      - ./h2/:/opt/h2-data
    restart: always

